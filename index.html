<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Suporte Técnico K30i">
<title>Suporte Técnico K30i - v1.22</title>
<link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Suporte%20K30i%22,%22short_name%22:%22K30i%22,%22start_url%22:%22index.html%22,%22display%22:%22standalone%22,%22background_color%22:%22#ffffff%22,%22theme_color%22:%22#075E54%22}">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
:root {
  --verde: #25a244;
  --verde-escuro: #1a7a35;
  --verde-bg: #e8f5ee;
  --header-bg: #1a1a2e;
  --cinza-escuro: #1c1c1c;
  --cinza-claro: #f5f5f5;
  --branco: #ffffff;
  --amarelo: #f5a623;
  --fundo-chat: #f0f2f5;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: #f0f2f5; }
body { font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: flex-start; }
#app { width: 100%; max-width: 480px; height: 100vh; height: 100dvh; display: flex; flex-direction: column; background: var(--fundo-chat); overflow: hidden; }

/* HEADER ATUALIZADO COM SELETOR DE MODELO */
#header { background: var(--header-bg); color: white; padding: 15px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 10; }
.info-tecnica { display: flex; flex-direction: column; }
.nome-app { font-weight: 700; font-size: 1.1rem; }
.status-online { font-size: 0.75rem; color: #4ade80; display: flex; align-items: center; }
.status-online::before { content: ''; width: 8px; height: 8px; background: #4ade80; border-radius: 50%; margin-right: 5px; }

#seletor-modelo { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 5px; border-radius: 5px; font-size: 0.8rem; outline: none; }

/* CHAT E MENSAGENS */
#chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
.mensagem { max-width: 85%; padding: 10px 15px; border-radius: 15px; font-size: 0.95rem; line-height: 1.4; position: relative; animation: fadeIn 0.3s ease; }
.recebida { background: var(--branco); align-self: flex-start; border-top-left-radius: 2px; color: var(--cinza-escuro); box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
.enviada { background: #dcf8c6; align-self: flex-end; border-top-right-radius: 2px; color: var(--cinza-escuro); box-shadow: 0 1px 2px rgba(0,0,0,0.1); }

/* CARDS DE ATALHO */
.grid-atalhos { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
.card-atalho { background: var(--branco); border: 1px solid #ddd; padding: 12px; border-radius: 10px; text-align: center; cursor: pointer; transition: 0.2s; font-size: 0.85rem; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 5px; }
.card-atalho:active { transform: scale(0.95); background: var(--verde-bg); }
.card-atalho i { font-size: 1.2rem; color: var(--verde); }
.destaque-wifi { border: 2px solid var(--amarelo) !important; grid-column: span 2; }

/* INPUT */
#input-area { background: #f0f2f5; padding: 10px; display: flex; align-items: center; gap: 8px; border-top: 1px solid #ddd; }
#user-input { flex: 1; padding: 12px 15px; border-radius: 25px; border: none; outline: none; font-size: 0.95rem; box-shadow: inset 0 1px 2px rgba(0,0,0,0.1); }
#send-btn { background: var(--verde); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
#send-btn:active { background: var(--verde-escuro); transform: scale(0.9); }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <div class="info-tecnica">
      <span class="nome-app">Consultor K30i</span>
      <span class="status-online">Modo Offline 100%</span>
    </div>
    <select id="seletor-modelo" onchange="alterarModelo(this.value)">
      <option value="K30i">K30i-1.00 (AMF)</option>
      <option value="K30XTe">K30XTe-8.40</option>
      <option value="K30XL">K30XL-4.10</option>
      <option value="K30ATS">K30ATS-2.10</option>
      <option value="K30SLV">K30SLV-3.10</option>
      <option value="K50L">K50L-1.10</option>
    </select>
  </div>

  <div id="chat-container">
    <div class="mensagem recebida">
      Olá! Sou seu assistente técnico K30i. Como posso ajudar hoje?
      <div class="grid-atalhos">
        <div class="card-atalho destaque-wifi" onclick="enviarDuvida('Configurar Wi-Fi')">🌐 Configurar Wi-Fi (Destaque)</div>
        <div class="card-atalho" onclick="enviarDuvida('Alarmes')">⚠️ Alarmes</div>
        <div class="card-atalho" onclick="enviarDuvida('Parâmetros')">⚙️ Parâmetros</div>
        <div class="card-atalho" onclick="enviarDuvida('Esquema de Ligação')">🔌 Ligação</div>
        <div class="card-atalho" onclick="enviarDuvida('Manual PDF')">📖 Manuais</div>
      </div>
    </div>
  </div>

  <div id="input-area">
    <input type="text" id="user-input" placeholder="Digite sua dúvida ou código..." onkeypress="if(event.key==='Enter') processarInput()">
    <button id="send-btn" onclick="processarInput()">➤</button>
  </div>
</div>

<script>
let MODELO_ATIVO = "K30i";

function alterarModelo(val) {
  MODELO_ATIVO = val;
  addMensagem("Sistema", `Modelo alterado para <b>${val}</b>. As consultas agora serão filtradas para este equipamento.`, "recebida");
}

function processarInput() {
  const input = document.getElementById('user-input');
  const texto = input.value.trim();
  if(!texto) return;
  
  addMensagem("Você", texto, "enviada");
  input.value = '';
  
  // Lógica de resposta "Técnico com Pressa"
  setTimeout(() => {
    responder(texto);
  }, 600);
}

function addMensagem(autor, texto, classe) {
  const container = document.getElementById('chat-container');
  const div = document.createElement('div');
  div.className = `mensagem ${classe}`;
  div.innerHTML = texto;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function enviarDuvida(tema) {
  addMensagem("Você", tema, "enviada");
  responder(tema);
}

function responder(duvida) {
  let r = "";
  const d = duvida.toLowerCase();

  if(d.includes("wifi") || d.includes("wi-fi")) {
    r = "<b>CONFIGURAÇÃO WI-FI (Essencial):</b><br>1. Acesse o modo AP segurando a tecla [i] por 5s.<br>2. Conecte no SSID 'K30i_AP'.<br>3. IP padrão: 192.168.4.1.<br><small>Clique para ver detalhes de segurança...</small>";
  } else if(d.includes("alarme")) {
    r = `Exibindo alarmes para <b>${MODELO_ATIVO}</b>:<br>• E01: Falha na Partida<br>• E02: Baixa Pressão Óleo<br>Pesquise o código específico para ver a solução.`;
  } else {
    r = `Estou processando sua dúvida sobre "${duvida}" para o modelo ${MODELO_ATIVO}. No momento, esta função core está sendo carregada na v1.22.`;
  }
  
  addMensagem("Consultor", r, "recebida");
}
</script>

</body>
</html>
