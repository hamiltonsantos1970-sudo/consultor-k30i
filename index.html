<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K30i - Final UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-principal: #0b111e;
            --bg-cards: #161c2b;
            --bg-balao-pergunta: #2b3344;
            --bg-balao-resposta: #1a2235;
            --bg-telemetria: #111723;
            --verde-status: #39d353;
            --azul-msg: #4fc3f7;
            --texto: #e0e6ed;
            --texto-dim: #8696a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }

        body { background-color: var(--bg-principal); color: var(--texto); height: 100vh; display: flex; flex-direction: column; }

        header { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
        .on { color: var(--verde-status); font-size: 10px; font-weight: bold; text-align: center; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .card { background: var(--bg-cards); border-radius: 18px; padding: 15px; text-align: center; font-size: 10px; font-weight: bold; border: 1px solid rgba(255,255,255,0.03); }
        .card i { display: block; font-size: 20px; margin-bottom: 8px; }

        .chat { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }

        .wrapper { display: flex; width: 100%; }
        .pergunta { justify-content: flex-end; }
        .resposta { justify-content: flex-start; }

        .balao {
            max-width: 85%;
            padding: 12px 15px;
            font-size: 14px;
            line-height: 1.4;
            position: relative;
        }

        /* Aplicação do detalhe lateral e sombra (Pedido do Usuário) */
        .pergunta .balao {
            background-color: var(--bg-balao-pergunta);
            border-radius: 18px 4px 18px 18px;
            border: 1px solid rgba(255, 255, 255, 0.12); /* Borda lateral sutil */
            box-shadow: 2px 2px 8px rgba(0,0,0,0.4); /* Sombreado lateral */
        }

        .resposta .balao {
            background-color: var(--bg-balao-resposta);
            border-radius: 4px 18px 18px 18px;
            border: 1px solid rgba(255, 255, 255, 0.08); /* Borda lateral sutil */
            box-shadow: -2px 2px 8px rgba(0,0,0,0.4); /* Sombreado lateral */
        }

        .telemetria {
            background-color: var(--bg-telemetria);
            border-radius: 10px;
            padding: 15px;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
        }
        .label { color: var(--texto-dim); font-size: 9px; font-weight: bold; display: block; margin-bottom: 4px; }
        .valor { font-size: 15px; font-weight: bold; }

        .hora { display: flex; justify-content: flex-end; font-size: 10px; color: var(--texto-dim); margin-top: 6px; gap: 4px; }

        .footer { padding: 15px; display: flex; align-items: center; gap: 10px; }
        .input-sim { flex: 1; background: #1d263a; border-radius: 25px; padding: 12px 18px; color: var(--texto-dim); font-size: 14px; }
        .btn-mic { width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(145deg, #3a5ba0, #1e335a); border: none; color: white; font-size: 20px; display: flex; align-items: center; justify-content: center; }

        nav { display: flex; justify-content: space-around; padding: 15px; background: #0d1424; border-top: 1px solid rgba(255,255,255,0.05); }
        nav i { color: var(--texto-dim); font-size: 20px; }
    </style>
</head>
<body>

    <header>
        <i class="fa-solid fa-bars"></i>
        <div>
            <h1 style="font-size: 18px; color: var(--azul-msg);">K30i</h1>
            <div class="on">● ONLINE</div>
        </div>
        <i class="fa-solid fa-ellipsis-vertical"></i>
    </header>

    <div class="grid">
        <div class="card" style="color: #f85149;"><i class="fa-solid fa-circle-exclamation"></i> FALHA ATIVA</div>
        <div class="card" style="color: #ff8c67;"><i class="fa-solid fa-triangle-exclamation"></i> AVISO ATIVO</div>
        <div class="card"><i class="fa-solid fa-calendar-day"></i> PROGRAMAÇÃO</div>
        <div class="card"><i class="fa-solid fa-microchip"></i> ENTRADAS/SAÍDAS</div>
    </div>

    <main class="chat">
        <div class="wrapper pergunta">
            <div class="balao">
                Válvula de alívio verificada. Acúmulo de resíduos na vedação secundária.
                <div class="hora">09:45 AM <i class="fa-solid fa-check-double" style="color: var(--verde-status);"></i></div>
            </div>
        </div>

        <div class="wrapper resposta">
            <div class="balao">
                Protocolo aceito. Status de telemetria:
                <div class="telemetria">
                    <div>
                        <span class="label">PRESSÃO</span><span class="valor">14.2 bar</span><br><br>
                        <span class="label">FLUXO</span><span class="valor">2.4 L/m</span>
                    </div>
                    <div>
                        <span class="label">TEMP.</span><span class="valor">84°C</span><br><br>
                        <span class="label">VIBRAÇÃO</span><span class="valor" style="color: var(--verde-status);">Estável</span>
                    </div>
                </div>
                <div class="hora">09:46 AM</div>
            </div>
        </div>
    </main>

    <div class="footer">
        <div class="input-sim">Digite uma mensagem...</div>
        <button class="btn-mic"><i class="fa-solid fa-microphone"></i></button>
    </div>

    <nav>
        <i class="fa-solid fa-message" style="color: var(--azul-msg);"></i>
        <i class="fa-solid fa-chart-line"></i>
        <i class="fa-solid fa-server"></i>
        <i class="fa-solid fa-gear"></i>
    </nav>

</body>
</html>
