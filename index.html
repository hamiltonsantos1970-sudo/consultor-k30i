<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K30i - Interface Industrial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* 1. DEFINIÇÃO DE CORES (PALETA DA IMAGEM) */
        :root {
            --bg-deep: #0b111e;      /* Fundo principal azul marinho quase preto */
            --bg-card: #161c2b;      /* Fundo dos botões de status */
            --bg-bubble-left: #1a2235; /* Balão de quem recebe (Sistema) */
            --bg-bubble-right: #2b3344; /* Balão de quem envia (Usuário) */
            --bg-input: #1d263a;     /* Fundo da barra de digitação */
            --text-main: #e0e6ed;    /* Texto claro */
            --text-dim: #8696a0;     /* Texto cinza para horários */
            --accent-blue: #3a5ba0;  /* Gradiente do microfone */
            --accent-green: #39d353; /* Status Online */
            --alert-orange: #ff8c67; /* Aviso de Sistema */
            --alert-red: #f85149;    /* Falha Ativa */
        }

        /* 2. RESET E ESTRUTURA BÁSICA */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 3. HEADER (TOPO) */
        header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .header-title { text-align: center; }
        .header-title h1 { font-size: 18px; letter-spacing: 1px; color: #4fc3f7; }
        .status-online { color: var(--accent-green); font-size: 10px; font-weight: bold; margin-top: 2px; }

        /* 4. GRID DE STATUS (CARD SUPERIORES) */
        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 15px;
        }
        .card {
            background: var(--bg-card);
            border-radius: 20px;
