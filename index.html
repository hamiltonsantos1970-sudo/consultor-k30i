<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K30i v1.1.4</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* TEMA ESCURO WHATSAPP */
        :root {
            --topo: #202c33;
            --fundo: #0b141a;
            --balao-eu: #005c4b;
            --balao-ele: #202c33;
            --texto: #e9edef;
            --subtitulo: #8696a0;
            --accent: #00a884;
        }

        /* TEMA CLARO WHATSAPP */
        body.light-mode {
            --topo: #ffffff;
            --fundo: #efeae2;
            --balao-eu: #d9fdd3;
            --balao-ele: #ffffff;
            --texto: #111b21;
            --subtitulo: #667781;
            --accent: #25d366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        
        html, body { 
            height: 100%; width: 100%; 
            background-color: var(--fundo); 
            display: flex; flex-direction: column; 
            overflow: hidden;
        }

        /* HEADER */
        header { 
            height: 60px; background: var(--topo); 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 15px; z-index: 100; border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        /* MENU DRAWER (FIXO) */
        #drawer { 
            position: fixed; top: 60px; left: 0; width: 100%; 
            background: var(--topo); z-index: 90; 
            transition: 0.4s; border-bottom: 1px solid rgba(0,0,0,0.1);
            transform: translateY(0);
        }
        #drawer.recolhido { transform: translateY(-100%); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .card { background: var(--balao-ele); padding: 12px; border-radius: 10px; text-align: center; color: var(--texto); font-size: 11px; border: 1px solid rgba(0,0,0,0.05); }

        .alca { 
            position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);
            height: 20px; width: 40px; background: var(--topo); 
            border-radius: 0 0 10px 10px; display: flex; justify-content: center; align-items: center;
        }

        /* CHAT */
        #chat { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { max-width: 85%; padding: 8px 12px; border-radius: 8px; font-size: 14px; color: var(--texto); box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .eu { align-self: flex-end; background: var(--balao-eu); border-top-right-radius: 0; }
        .ele { align-self: flex-start; background: var(--balao-ele); border-top-left-radius: 0; }

        /* RODAPE */
        footer { padding: 10px; display: flex; align-items: center; gap: 8px; background: transparent; }
        .input-box { flex: 1; background: var(--topo); border-radius: 25px; padding: 12px 15px; color: var(--subtitulo); font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        
        .btn-mic { 
            width: 48px; height: 48px; border-radius: 50%; border: none; 
            background: var(--accent); color: white; font-size: 20px;
        }
        .gravando { background: #ff5252; }

        .icon { cursor: pointer; color: var(--subtitulo); font-size: 18px; }
    </style>
</head>
<body class="light-mode"> <header>
        <div style="display: flex; align-items: center; gap: 10px;">
            <div style="width:35px; height:35px; border-radius:50%; background:#ccc; display:flex; align-items:center; justify-content:center;"><i class="fa-solid fa-user"></i></div>
            <div>
                <b style="color: var(--texto); font-size: 15px;">K30i Bot</b><br>
                <span style="color: var(--accent); font-size: 11px;">online</span>
            </div>
        </div>
        <div style="display: flex; gap: 15px;">
            <i class="fa-solid fa-moon icon" id="theme-btn" onclick="toggleTheme()"></i>
            <i class="fa-solid fa-rotate icon" onclick="location.reload()"></i>
        </div>
    </header>

    <div id="drawer">
        <div class="grid">
            <div class="card"><i class="fa-solid fa-triangle-exclamation"></i> FALHA</div>
            <div class="card"><i class="fa-solid fa-circle-info"></i> AVISO</div>
        </div>
        <div class="alca" onclick="toggleMenu()"><i id="seta" class="fa-solid fa-chevron-up"></i></div>
    </div>

    <main id="chat">
        <div class="msg ele">Olá! Visual WhatsApp v1.1.4 carregado.</div>
    </main>

    <footer>
        <div class="input-box" id="status">Mensagem</div>
        <button class="btn-mic" id="mic"><i class="fa-solid fa-microphone"></i></button>
    </footer>

    <script>
        const drw = document.getElementById('drawer');
        const seta = document.getElementById('seta');
        
        function toggleMenu() {
            const isRec = drw.classList.toggle('recolhido');
            seta.style.transform = isRec ? 'rotate(180deg)' : 'rotate(0deg)';
        }

        window.onload = () => setTimeout(() => { drw.classList.add('recolhido'); seta.style.transform = 'rotate(180deg)'; }, 2000);

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            document.getElementById('theme-btn').className = isLight ? 'fa-solid fa-moon icon' : 'fa-solid fa-sun icon';
        }

        // VOZ
        const mic = document.getElementById('mic');
        const status = document.getElementById('status');
        const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (Rec) {
            const recognition = new Rec();
            recognition.lang = 'pt-BR';

            mic.onclick = () => { recognition.start(); mic.classList.add('gravando'); status.innerText = "Ouvindo..."; };
            
            recognition.onresult = (e) => {
                const txt = e.results[0][0].transcript;
                status.innerText = "Mensagem";
                document.getElementById('chat').insertAdjacentHTML('beforeend', `<div class="msg eu">${txt}</div>`);
                document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
            };
            
            recognition.onend = () => { mic.classList.remove('gravando'); if(status.innerText === "Ouvindo...") status.innerText = "Mensagem"; };
        }
    </script>
</body>
</html>
