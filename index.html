<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K30i - Icon Fix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* TEMA ESCURO PADRÃO */
        :root {
            --bg-principal: #0b111e;
            --bg-header: #0b111e;
            --bg-card: #161c2b;
            --bg-pergunta: #2b3344;
            --bg-resposta: #1a2235;
            --bg-tel: #111723;
            --cor-texto: #e0e6ed;
            --cor-texto-dim: #8696a0;
            --azul: #4fc3f7;
            --verde: #39d353;
            --borda: rgba(255,255,255,0.1);
        }

        .light-mode {
            --bg-principal: #f0f2f5;
            --bg-header: #ffffff;
            --bg-card: #ffffff;
            --bg-pergunta: #e3f2fd;
            --bg-resposta: #ffffff;
            --bg-tel: #f8f9fa;
            --cor-texto: #1c1e21;
            --cor-texto-dim: #606770;
            --azul: #1976d2;
            --verde: #2e7d32;
            --borda: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }

        html, body { height: 100dvh; width: 100vw; background-color: var(--bg-principal); overflow: hidden; display: flex; flex-direction: column; }

        header { 
            height: 65px;
            padding: 0 15px; 
            background: var(--bg-header);
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            z-index: 2000; 
            position: relative;
            border-bottom: 1px solid var(--borda);
        }

        .header-center { text-align: center; }
        .fw-tag { font-size: 10px; color: var(--azul); background: rgba(79, 195, 247, 0.1); padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-left: 5px; }

        /* MENU DRAWER */
        .drawer { 
            position: fixed;
            top: 65px; 
            left: 0;
            width: 100%;
            background: var(--bg-header);
            z-index: 1000;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-bottom: 1px solid var(--borda);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transform: translateY(0); 
        }

        .drawer-fechado { transform: translateY(-100%); } 

        .grid-botoes { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 20px; }
        .card { background: var(--bg-card); border-radius: 15px; padding: 18px; text-align: center; font-size: 11px; font-weight: bold; border: 1px solid var(--borda); color: var(--cor-texto); }
        .card i { display: block; font-size: 22px; margin-bottom: 8px; }

        .alca-container { position: absolute; bottom: -25px; left: 50%; transform: translateX(-50%); z-index: 1001; }
        .alca { height: 25px; width: 60px; background: var(--bg-header); display: flex; justify-content: center; align-items: center; border-radius: 0 0 15px 15px; border: 1px solid var(--borda); border-top: none; cursor: pointer; }

        /* CHAT */
        .chat-container { flex: 1; padding: 25px 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; background: var(--bg-principal); }
        .balao { max-width: 85%; padding: 15px; font-size: 14px; border-radius: 15px; box-shadow: 0 3px 10px rgba(0,0,0,0.2); color: var(--cor-texto); }
        .pergunta .balao { background: var(--bg-pergunta); border-left: 5px solid var(--azul); align-self: flex-end; border-bottom-right-radius: 2px; }
        .resposta .balao { background: var(--bg-resposta); border-left: 5px solid #546e7a; align-self: flex-start; border-bottom-left-radius: 2px; }

        .telemetria { background: var(--bg-tel); border-radius: 10px; padding: 15px; margin-top: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; border: 1px solid var(--borda); }
        .tel-item span { font-size: 10px; font-weight: bold; color: var(--cor-texto-dim); display: block; margin-bottom: 4px; }
        .tel-item b { font-size: 16px; color: var(--cor-texto); }

        /* FOOTER */
        footer { padding: 15px; background: var(--bg-header); display: flex; align-items: center; gap: 10px; border-top: 1px solid var(--borda); }
        .input-box { flex: 1; background: var(--bg-tel); border-radius: 25px; padding: 12px 20px; color: var(--cor-texto-dim); font-size: 14px; border: 1px solid var(--borda); }
        .btn-mic { width: 50px; height: 50px; border-radius: 50%; border: none; background: var(--azul); color: white; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        .gravando { background: #ff5252 !important; }

        .icon-btn { cursor: pointer; padding: 8px; font-size: 18px; color: var(--cor-texto-dim); }
    </style>
</head>
<body>

    <header>
        <i class="fa-solid fa-bars icon-btn"></i>
        <div class="header-center">
            <h1 style="font-size: 18px; color: var(--cor-texto);">K30i <span class="fw-tag">v1.0.8</span></h1>
            <div style="color: var(--verde); font-size: 10px; font-weight: bold;">● ONLINE</div>
        </div>
        <div style="display: flex; gap: 10px;">
            <i class="fa-solid fa-sun icon-btn" id="theme-btn" onclick="toggleTheme()"></i>
            <i class="fa-solid fa-rotate icon-btn" onclick="location.reload()"></i>
        </div>
    </header>

    <div id="drawer" class="drawer">
        <div class="grid-botoes">
            <div class="card" style="color: #ff5252;"><i class="fa
