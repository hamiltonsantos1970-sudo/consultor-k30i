<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K30i - Ver 0.04</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --topo: #ffffff; --fundo: #f0f2f5; --balao-eu: #d9fdd3; --balao-ele: #ffffff;
            --texto: #111b21; --subtitulo: #667781; --accent: #25d366; --borda: #e9edef;
            --danger: #ea0038; --card: #ffffff;
        }

        /* VARIAVEIS MODO ESCURO */
        body.dark-mode {
            --topo: #202c33; --fundo: #0b141a; --balao-eu: #005c4b; --balao-ele: #202c33;
            --texto: #e9edef; --subtitulo: #8696a0; --borda: #222d34; --card: #233138;
        }

        body { background-color: #2c2c2c; height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; overflow: hidden; }

        .mobile-wrapper { 
            width: 360px; height: 740px; background: var(--fundo);
            border: 10px solid #111; border-radius: 30px;
            display: flex; flex-direction: column; position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6); overflow: hidden; transition: 0.3s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }

        header { height: 60px; background: var(--topo); display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid var(--borda); z-index: 1000; justify-content: space-between; }
        .perfil { display: flex; align-items: center; gap: 10px; }
        .foto-perfil { width: 38px; height: 38px; border-radius: 50%; background: #6a7175; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .v-tag { font-family: monospace; color: #ea0038; font-size: 11px; font-weight: bold; border: 1px solid #ddd; padding: 1px 4px; border-radius: 4px; }
        
        #btn-tema { cursor: pointer; color: var(--subtitulo); font-size: 18px; padding: 5px; }

        #drawer { background: var(--topo); border-bottom: 1px solid var(--borda); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); position: relative; z-index: 900; }
        #drawer.recolhido { margin-top: -190px; } 
        
        .grid-atalhos { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px; }

        .card-btn { 
            background: var(--card); border: 1px solid var(--borda); border-radius: 8px; 
            padding: 12px; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; cursor: pointer; transition: 0.2s;
        }
        .card-btn i { color: var(--accent); font-size: 18px; margin-bottom: 5px; }
        .card-btn span { font-size: 10px; font-weight: bold; color: var(--texto); text-transform: uppercase; }
